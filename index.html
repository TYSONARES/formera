<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#11130f" />
  <title>Formera — Stüdyo Yönetimi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#" aria-label="Formera ana sayfa">
        <span class="brand-mark">F</span>
        <span>formera</span>
      </a>

      <nav class="nav" aria-label="Ana menü">
        <p class="nav-label">Çalışma alanı</p>
        <button class="nav-item active" data-page="dashboard"><span>⌂</span> Genel bakış</button>
        <button class="nav-item" data-page="members"><span>♙</span> Üyeler <b id="memberCount">48</b></button>
        <button class="nav-item" data-page="programs"><span>▤</span> Programlar</button>
        <button class="nav-item" data-page="calendar"><span>□</span> Takvim</button>
        <p class="nav-label">İşletme</p>
        <button class="nav-item" data-page="finance"><span>◒</span> Finans</button>
        <button class="nav-item" data-page="reports"><span>↗</span> Raporlar</button>
        <button class="nav-item" data-page="team"><span>♧</span> Ekip</button>
      </nav>

      <div class="studio-card">
        <span class="studio-avatar" id="studioAvatar">NF</span>
        <div><strong id="studioName">NorthFit Studio</strong><small id="studioLocation">Kadıköy · İstanbul</small></div>
        <button aria-label="Stüdyo değiştir" data-action="cycle-studio">↻</button>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <button class="mobile-menu" aria-label="Menüyü aç">☰</button>
        <label class="search"><span>⌕</span><input placeholder="Üye, program veya işlem ara..." /></label>
        <div class="top-actions">
          <button class="icon-button" aria-label="Bildirimler">♢<i></i></button>
          <button class="role-switch" id="roleSwitch"><span>İşletmeci</span><small>Üye görünümü</small></button>
          <span class="user-avatar">OY</span>
        </div>
      </header>

      <section class="content" id="appContent"></section>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <dialog class="modal" id="memberModal">
    <form method="dialog" id="memberForm">
      <div class="modal-head"><div><span class="eyebrow" id="memberModalEyebrow">YENİ KAYIT</span><h2 id="memberModalTitle">Yeni üye ekle</h2></div><button value="cancel" class="modal-close" aria-label="Kapat">×</button></div>
      <label>Ad soyad<input name="name" required placeholder="Örn. Ayşe Yılmaz"></label>
      <div class="form-grid"><label>Antrenör<select name="trainer"><option>Ece</option><option>Kerem</option></select></label><label>Paket<select name="package"><option>12 Seans</option><option>8 Seans</option><option>24 Seans</option></select></label></div>
      <label>Telefon<input name="phone" inputmode="tel" placeholder="05xx xxx xx xx"></label>
      <div class="modal-actions"><button value="cancel" class="secondary">Vazgeç</button><button type="submit" value="default" class="primary">Üyeyi kaydet</button></div>
    </form>
  </dialog>
  <dialog class="modal" id="financeModal">
    <form method="dialog" id="financeForm">
      <div class="modal-head"><div><span class="eyebrow">FİNANS</span><h2>Gelir / gider ekle</h2></div><button value="cancel" class="modal-close" aria-label="Kapat">×</button></div>
      <label>İşlem adı<input name="title" required placeholder="Örn. 12 seans paket satışı"></label>
      <div class="form-grid"><label>Tip<select name="type"><option value="income">Gelir</option><option value="expense">Gider</option></select></label><label>Tutar<input name="amount" required inputmode="numeric" placeholder="9600"></label></div>
      <div class="form-grid"><label>Kategori<input name="category" placeholder="Paket satışı"></label><label>Tarih<input name="date" type="date"></label></div>
      <label>Durum<select name="status"><option value="paid">Ödendi</option><option value="pending">Bekliyor</option></select></label>
      <div class="modal-actions"><button value="cancel" class="secondary">Vazgeç</button><button type="submit" value="default" class="primary">İşlemi kaydet</button></div>
    </form>
  </dialog>
  <dialog class="modal" id="programModal">
    <form method="dialog" id="programForm">
      <div class="modal-head"><div><span class="eyebrow">PROGRAM</span><h2>Program oluştur</h2></div><button value="cancel" class="modal-close" aria-label="Kapat">×</button></div>
      <label>Program adı<input name="title" required placeholder="Örn. Alt vücut güç"></label>
      <div class="form-grid"><label>Hedef<input name="goal" placeholder="Kuvvet ve form"></label><label>Seviye<select name="level"><option>Başlangıç</option><option>Orta</option><option>İleri</option><option>Herkes</option></select></label></div>
      <div class="form-grid"><label>Süre / dk<input name="duration" inputmode="numeric" placeholder="45"></label><label>Atanan üye<input name="assigned" placeholder="Selin Aksoy"></label></div>
      <label>Egzersizler<textarea name="exercises" required rows="5" placeholder="Goblet squat · 4 × 10&#10;Romanian deadlift · 3 × 12"></textarea></label>
      <div class="modal-actions"><button value="cancel" class="secondary">Vazgeç</button><button type="submit" value="default" class="primary">Programı kaydet</button></div>
    </form>
  </dialog>
  <dialog class="modal" id="sessionModal">
    <form method="dialog" id="sessionForm">
      <div class="modal-head"><div><span class="eyebrow">TAKVİM</span><h2>Seans ekle</h2></div><button value="cancel" class="modal-close" aria-label="Kapat">×</button></div>
      <div class="form-grid"><label>Tarih<input name="date" type="date" required></label><label>Saat<input name="time" type="time" required></label></div>
      <div class="form-grid"><label>Üye<input name="member" required placeholder="Selin Aksoy"></label><label>Antrenör<select name="trainer"><option>Ece</option><option>Kerem</option></select></label></div>
      <div class="form-grid"><label>Program<input name="program" placeholder="Alt vücut güç"></label><label>Salon<select name="room"><option>Salon A</option><option>Salon B</option><option>Online</option></select></label></div>
      <div class="modal-actions"><button value="cancel" class="secondary">Vazgeç</button><button type="submit" value="default" class="primary">Seansı kaydet</button></div>
    </form>
  </dialog>
  <dialog class="modal" id="trainerModal">
    <form method="dialog" id="trainerForm">
      <div class="modal-head"><div><span class="eyebrow">EKİP</span><h2>Antrenör ekle</h2></div><button value="cancel" class="modal-close" aria-label="Kapat">×</button></div>
      <label>Ad<input name="name" required placeholder="Örn. Derya"></label>
      <div class="form-grid"><label>Rol<input name="role" placeholder="PT Coach"></label><label>Uzmanlık<input name="specialty" placeholder="Pilates · mobilite"></label></div>
      <div class="form-grid"><label>Telefon<input name="phone" inputmode="tel" placeholder="05xx xxx xx xx"></label><label>Prim %<input name="commission" inputmode="numeric" placeholder="15"></label></div>
      <div class="modal-actions"><button value="cancel" class="secondary">Vazgeç</button><button type="submit" value="default" class="primary">Antrenörü kaydet</button></div>
    </form>
  </dialog>
  <script src="app.js"></script>
</body>
</html>
